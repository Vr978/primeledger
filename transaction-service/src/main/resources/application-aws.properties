# AWS profile - uses environment variables injected by ECS task definition
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

jwt.secret=${JWT_SECRET}
account-service.url=${ACCOUNT_SERVICE_URL}

# Kafka disabled in AWS (using Kinesis instead)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.table=flyway_schema_history_transaction
spring.flyway.validate-on-migrate=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Kinesis
kinesis.stream-name=${KINESIS_STREAM_NAME:}
aws.region=${AWS_REGION:us-east-1}
